version: "3.9"

services:
  api:
    build: .
    container_name: verifai-api
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - ./verifai_index:/app/verifai_index
      - ./uploads:/app/uploads
    command: uvicorn backend.api.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  dashboard:
    build: .
    container_name: verifai-dashboard
    ports:
      - "8501:8501"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      api:
        condition: service_healthy
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0
